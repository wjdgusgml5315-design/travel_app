<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - TripFlow</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/screens/my-page.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="button--icon" onclick="history.back()"><span class="material-icons-round">arrow_back</span></button>
            <h1 class="header__title" style="flex:1; text-align:center; margin-right: 40px;">마이페이지</h1>
        </header>

        <main class="section">
            <!-- User Profile -->
            <article class="profile-card">
                <div class="profile-card__avatar">
                    <span class="material-icons-round">person</span>
                </div>
                <div class="profile-card__info">
                    <h2 class="profile-card__name">지수 여행가님</h2>
                    <p class="profile-card__email">jujisu@tripflow.com</p>
                </div>
                <button class="button--icon" style="color: var(--color-text-tertiary);">
                    <span class="material-icons-round">settings</span>
                </button>
            </article>

            <!-- Recently Viewed -->
            <section style="margin-bottom: var(--spacing-32);">
                <div class="u-flex-between" style="margin-bottom: var(--spacing-16);">
                    <h3 style="font-size: 18px; font-weight: var(--weight-bold);">최근 본 여행지</h3>
                    <button class="button--ghost button--small">전체보기</button>
                </div>
                <div class="horizontal-list">
                    <div class="card--mini">
                        <img src="https://images.unsplash.com/photo-1542296332-2e4473faf563?auto=format&fit=crop&w=400&q=80" alt="제주">
                        <div class="card--mini__title">제주도</div>
                    </div>
                    <div class="card--mini">
                        <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?auto=format&fit=crop&w=400&q=80" alt="도쿄">
                        <div class="card--mini__title">도쿄</div>
                    </div>
                    <div class="card--mini">
                        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=400&q=80" alt="파리">
                        <div class="card--mini__title">파리</div>
                    </div>
                </div>
            </section>

            <!-- My Plan & Interaction -->
            <div class="menu-list">
                <div class="menu-item">
                    <span class="material-icons-round menu-item__icon">bookmark_border</span>
                    <span class="menu-item__label">마이플랜</span>
                    <span class="material-icons-round menu-item__arrow">chevron_right</span>
                </div>
                <div class="menu-item">
                    <span class="material-icons-round menu-item__icon">favorite_border</span>
                    <span class="menu-item__label">위시리스트</span>
                    <span class="material-icons-round menu-item__arrow">chevron_right</span>
                </div>
                <div class="menu-item">
                    <span class="material-icons-round menu-item__icon">history</span>
                    <span class="menu-item__label">여행 기록</span>
                    <span class="material-icons-round menu-item__arrow">chevron_right</span>
                </div>
                <div class="menu-item">
                    <span class="material-icons-round menu-item__icon">help_outline</span>
                    <span class="menu-item__label">1:1 문의</span>
                    <span class="material-icons-round menu-item__arrow">chevron_right</span>
                </div>
            </div>

            <div style="margin-top: var(--spacing-24);">
                <button class="button--ghost button--large" style="color: var(--color-error);">로그아웃</button>
            </div>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="bottom-nav__item" data-screen="index">
                <span class="material-icons-round bottom-nav__icon">home</span>
                <span>홈</span>
            </button>
            <button class="bottom-nav__item" data-screen="create">
                <span class="material-icons-round bottom-nav__icon">add_circle_outline</span>
                <span>만들기</span>
            </button>
            <button class="bottom-nav__item" data-screen="dashboard">
                <span class="material-icons-round bottom-nav__icon">dashboard</span>
                <span>대시보드</span>
            </button>
            <button class="bottom-nav__item" data-screen="record">
                <span class="material-icons-round bottom-nav__icon">auto_stories</span>
                <span>기록</span>
            </button>
            <button class="bottom-nav__item" data-screen="my-page">
                <span class="material-icons-round bottom-nav__icon">person</span>
                <span>마이</span>
            </button>
        </nav>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

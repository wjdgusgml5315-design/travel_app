<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 지도 - TripFlow</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        .map-container {
            width: 100%;
            height: calc(100vh - 140px);
            background: #eef2f5 url('https://img.freepik.com/free-vector/map-with-navigation-pins_53876-119335.jpg?w=1000') center center / cover no-repeat;
            position: relative;
            overflow: hidden;
        }
        .map-pin {
            position: absolute;
            background-color: var(--color-primary);
            color: white;
            padding: 4px;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-medium);
            cursor: pointer;
        }
        .map-pin span { transform: rotate(45deg); font-size: 20px; }
        .map-pin--food { background-color: #FF9500; }
        .map-pin--cafe { background-color: #5856D6; }

        .bottom-sheet {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background-color: var(--color-surface);
            border-radius: var(--radius-xl);
            padding: var(--spacing-16);
            box-shadow: var(--shadow-medium);
            display: flex;
            gap: var(--spacing-12);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="app-container" style="padding-bottom: 0;">
        <!-- Overlaid Header with Filters -->
        <div style="position: absolute; top: 0; left: 0; right: 0; z-index: 10; padding: var(--spacing-16);">
            <header class="header" style="background: var(--glass-bg); backdrop-filter: var(--glass-blur); border-radius: var(--radius-pill); margin-bottom: 12px; box-shadow: var(--shadow-soft);">
                <button class="button--icon" onclick="history.back()"><span class="material-icons-round">arrow_back</span></button>
                <span style="font-weight: var(--weight-bold);">제주 동부 지역</span>
                <button class="button--icon"><span class="material-icons-round">my_location</span></button>
            </header>
            <div class="chip-group">
                <div class="chip chip--active">전체</div>
                <div class="chip">음식점</div>
                <div class="chip">카페</div>
                <div class="chip">명소</div>
                <div class="chip">숙소</div>
            </div>
        </div>

        <!-- Map View -->
        <div class="map-container">
            <!-- Dummy Pins -->
            <div class="map-pin map-pin--food" style="top: 40%; left: 30%;">
                <span class="material-icons-round">restaurant</span>
            </div>
            <div class="map-pin map-pin--cafe" style="top: 35%; left: 60%;">
                <span class="material-icons-round">local_cafe</span>
            </div>
            <div class="map-pin" style="top: 55%; left: 50%;">
                <span class="material-icons-round">visibility</span>
            </div>

            <!-- Place Bottom Sheet -->
            <div class="bottom-sheet">
                <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=150&q=80" alt="장소" style="width:80px; height:80px; border-radius:var(--radius-m); object-fit:cover;">
                <div style="flex:1;">
                    <h4 style="font-size: 16px; font-weight: var(--weight-bold); margin-bottom: 2px;">델문도 카페</h4>
                    <p style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px;">제주시 조천읍 함덕리</p>
                    <div style="display: flex; gap: 8px;">
                        <button class="button--primary button--small" style="flex:1;">일정에 추가</button>
                        <button class="button--secondary button--icon"><span class="material-icons-round">favorite_border</span></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="bottom-nav__item" data-screen="index">
                <span class="material-icons-round bottom-nav__icon">home</span>
                <span>홈</span>
            </button>
            <button class="bottom-nav__item" data-screen="create">
                <span class="material-icons-round bottom-nav__icon">add_circle_outline</span>
                <span>여행 만들기</span>
            </button>
            <button class="bottom-nav__item" data-screen="dashboard">
                <span class="material-icons-round bottom-nav__icon">dashboard</span>
                <span>대시보드</span>
            </button>
            <button class="bottom-nav__item" data-screen="record">
                <span class="material-icons-round bottom-nav__icon">auto_stories</span>
                <span>기록</span>
            </button>
            <button class="bottom-nav__item" data-screen="my-page">
                <span class="material-icons-round bottom-nav__icon">person</span>
                <span>마이</span>
            </button>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 기록 - TripFlow</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="button--icon" onclick="history.back()"><span class="material-icons-round">arrow_back</span></button>
            <h1 class="header__title" style="flex:1; text-align:center;">여행 기록</h1>
            <button class="button--icon"><span class="material-icons-round">share</span></button>
        </header>

        <main>
            <!-- Gallery Section -->
            <section class="section">
                <h2 class="section__title">추억 갤러리</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                    <div style="aspect-ratio: 1/1; background: url('https://images.unsplash.com/photo-1542296332-2e4473faf563?auto=format&fit=crop&w=400&q=80') center/cover; border-radius: var(--radius-s);"></div>
                    <div style="aspect-ratio: 1/1; background: url('https://images.unsplash.com/photo-1590424748043-4dc975bbbd80?auto=format&fit=crop&w=400&q=80') center/cover; border-radius: var(--radius-s);"></div>
                    <div style="aspect-ratio: 1/1; background: url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=400&q=80') center/cover; border-radius: var(--radius-s);"></div>
                    <div style="aspect-ratio: 1/1; background: #E5E9F2; border-radius: var(--radius-s); display: flex; align-items: center; justify-content: center;">
                        <span class="material-icons-round" style="color:var(--color-text-tertiary);">add_a_photo</span>
                    </div>
                </div>
            </section>

            <!-- Visit Log Selection -->
            <section class="section">
                <h2 class="section__title">방문 장소 기록</h2>
                <div class="card" style="padding: var(--spacing-16);">
                    <ul style="display: flex; flex-direction: column; gap: 16px;">
                        <li style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <h4 style="font-size: 15px;">함덕 해수욕장</h4>
                                <p style="font-size: 11px; color: var(--color-text-tertiary);">Day 1 • 10:00</p>
                            </div>
                            <span class="material-icons-round" style="color:var(--color-primary);">check_circle</span>
                        </li>
                        <li style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <h4 style="font-size: 15px;">델문도 카페</h4>
                                <p style="font-size: 11px; color: var(--color-text-tertiary);">Day 1 • 11:30</p>
                            </div>
                            <span class="material-icons-round" style="color:var(--color-primary);">check_circle</span>
                        </li>
                        <li style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <h4 style="font-size: 15px;">만장굴</h4>
                                <p style="font-size: 11px; color: var(--color-text-tertiary);">Day 2 • 14:00</p>
                            </div>
                            <span class="material-icons-round" style="color:var(--color-text-tertiary);">radio_button_unchecked</span>
                        </li>
                    </ul>
                </div>
            </section>

            <!-- Memo Section -->
            <section class="section">
                <h2 class="section__title">여행 소감</h2>
                <textarea class="input-field" style="width: 100%; height: 120px; resize: none; border: 1px solid var(--color-primary-soft);" placeholder="이번 여행은 어떠셨나요?"></textarea>
            </section>

            <!-- Summary & Action -->
            <section class="section">
                <div class="card card--featured" style="background: var(--color-primary-soft); color: var(--color-primary); display: flex; align-items: center; gap: 12px;">
                    <span class="material-icons-round" style="font-size: 32px;">stars</span>
                    <div>
                        <h4 style="font-weight: var(--weight-bold);">여행 기록 완료!</h4>
                        <p style="font-size: 12px; opacity: 0.8;">소중한 추억이 갱신되었습니다.</p>
                    </div>
                </div>
                <button class="button--primary button--large" style="margin-top: var(--spacing-24);">기록 저장하고 종료하기</button>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <button class="bottom-nav__item" data-screen="index">
                <span class="material-icons-round bottom-nav__icon">home</span>
                <span>홈</span>
            </button>
            <button class="bottom-nav__item" data-screen="create">
                <span class="material-icons-round bottom-nav__icon">add_circle_outline</span>
                <span>여행 만들기</span>
            </button>
            <button class="bottom-nav__item" data-screen="dashboard">
                <span class="material-icons-round bottom-nav__icon">dashboard</span>
                <span>대시보드</span>
            </button>
            <button class="bottom-nav__item" data-screen="record">
                <span class="material-icons-round bottom-nav__icon">auto_stories</span>
                <span>기록</span>
            </button>
            <button class="bottom-nav__item" data-screen="my-page">
                <span class="material-icons-round bottom-nav__icon">person</span>
                <span>마이</span>
            </button>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
